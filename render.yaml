services:
  - type: web
    name: voxiraapp
    env: static
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: EXPO_PUBLIC_ASSEMBLYAI_KEY
        sync: false
